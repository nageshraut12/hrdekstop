version: "3.8"

services:
  mongodb:
    image: mongo:6
    container_name: smarthro-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DB: smarthro
    volumes:
      - mongodb_data:/data/db

  backend:
    build: .
    container_name: smarthro-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/smarthro?authSource=admin
      PORT: 5000
      JWT_SECRET: your-secret-key-here
      NODE_ENV: development
    depends_on:
      - mongodb
    volumes:
      - ./server:/app

  frontend:
    image: node:18-alpine
    container_name: smarthro-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    volumes:
      - ./client:/app
    stdin_open: true
    tty: true
    command: sh -c "npm install && npm start"
    depends_on:
      - backend

volumes:
  mongodb_data:

networks:
  default:
    name: smarthro-network
